            <div class="blog-meta">
                <a href="../index.html">Fu-Yun Wang</a> &middot; 2025
                &middot; Companion note for <a href="https://arxiv.org/abs/2512.13592" target="_blank">Image Diffusion Preview with Consistency Solver (CVPR 2026 Highlight)</a>

    document.addEventListener('DOMContentLoaded', function () {
        const content = document.getElementById('blog-content');
        content.innerHTML = `

<h2>Overview</h2>

<p>
This note provides a self-contained theoretical derivation for <strong>ConsistencySolver</strong>, a learnable ODE solver for accelerating diffusion model sampling. We start from the standard PF-ODE, derive its simplified form through a variable substitution, and then show how ConsistencySolver's update rule emerges naturally from classical Linear Multistep Methods (LMMs). Finally, we discuss the RL-based optimization and show that well-known solvers (DDIM, PNDM, DPM-Solver-2) are special cases.
</p>

<h2>From PF-ODE to the Simplified Form</h2>

<p>
Diffusion models define intermediate distributions
\\[
\\mathbb{P}_t(\\mathbf{x} \\mid \\mathbf{x}_0) = \\mathcal{N}(\\alpha_t \\mathbf{x}_0, \\sigma_t^2 \\mathbf{I}).
\\]
The forward process can be written as an SDE
\\[
\\mathrm{d}\\mathbf{x}_t = f_t \\mathbf{x}_t \\, \\mathrm{d}t + g_t \\, \\mathrm{d}\\mathbf{w}_t
\\]
with drift and diffusion coefficients
\\[
f_t = \\frac{\\dot{\\alpha}_t}{\\alpha_t}, \\qquad g_t^2 = \\frac{\\mathrm{d} \\sigma_t^2}{\\mathrm{d}t} - 2 \\frac{\\dot{\\alpha}_t}{\\alpha_t} \\sigma_t^2 = 2\\sigma_t \\dot{\\sigma}_t - \\frac{2\\dot{\\alpha}_t \\sigma_t^2}{\\alpha_t}.
\\]
Its deterministic reversal, the <strong>PF-ODE</strong>, reads
\\[
\\mathrm{d}\\mathbf{x}_t = \\biggl[ f_t \\mathbf{x}_t - \\frac{g_t^2}{2} \\nabla_{\\mathbf{x}_t} \\log \\mathbb{P}_t(\\mathbf{x}_t) \\biggr] \\mathrm{d}t.  \\tag{1}
\\]
A neural network is trained to predict \\(\\boldsymbol{\\epsilon}(\\mathbf{x}_t, t) = -\\sigma_t \\nabla_{\\mathbf{x}_t} \\log \\mathbb{P}_t(\\mathbf{x}_t)\\).
</p>

<p>
We now show that a simple variable substitution transforms (1) into a much cleaner form. Define
\\[
\\mathbf{y}_t = \\frac{\\mathbf{x}_t}{\\alpha_t}, \\qquad n_t = \\frac{\\sigma_t}{\\alpha_t}.
\\]
Since the PF-ODE is a <em>deterministic</em> ODE, we can apply the ordinary product rule:
\\[
\\mathrm{d}\\mathbf{y}_t = \\mathrm{d}\\!\\biggl(\\frac{\\mathbf{x}_t}{\\alpha_t}\\biggr) = \\frac{1}{\\alpha_t} \\mathrm{d}\\mathbf{x}_t - \\frac{\\dot{\\alpha}_t}{\\alpha_t^2} \\mathbf{x}_t \\, \\mathrm{d}t. \\tag{2}
\\]
Substituting (1) into (2):
\\[
\\mathrm{d}\\mathbf{y}_t = \\frac{1}{\\alpha_t} \\biggl[ \\frac{\\dot{\\alpha}_t}{\\alpha_t} \\mathbf{x}_t - \\frac{g_t^2}{2} \\nabla_{\\mathbf{x}_t} \\log \\mathbb{P}_t \\biggr] \\mathrm{d}t - \\frac{\\dot{\\alpha}_t}{\\alpha_t^2} \\mathbf{x}_t \\, \\mathrm{d}t.
\\]
The two \\(\\frac{\\dot{\\alpha}_t}{\\alpha_t^2} \\mathbf{x}_t\\) terms cancel, leaving
\\[
\\mathrm{d}\\mathbf{y}_t = -\\frac{g_t^2}{2\\alpha_t} \\nabla_{\\mathbf{x}_t} \\log \\mathbb{P}_t(\\mathbf{x}_t) \\, \\mathrm{d}t.  \\tag{3}
\\]
Replacing the score with \\(\\boldsymbol{\\epsilon}\\) via \\(\\nabla_{\\mathbf{x}_t} \\log \\mathbb{P}_t = -\\boldsymbol{\\epsilon} / \\sigma_t\\):
\\[
\\mathrm{d}\\mathbf{y}_t = \\frac{g_t^2}{2\\alpha_t \\sigma_t} \\boldsymbol{\\epsilon}(\\mathbf{x}_t, t) \\, \\mathrm{d}t. \\tag{4}
\\]
It remains to identify the prefactor. Expanding \\(g_t^2 = 2\\sigma_t \\dot{\\sigma}_t - 2\\dot{\\alpha}_t \\sigma_t^2 / \\alpha_t\\):
\\[
\\frac{g_t^2}{2\\alpha_t \\sigma_t} = \\frac{2\\sigma_t \\dot{\\sigma}_t - 2\\dot{\\alpha}_t \\sigma_t^2 / \\alpha_t}{2\\alpha_t \\sigma_t} = \\frac{\\dot{\\sigma}_t}{\\alpha_t} - \\frac{\\dot{\\alpha}_t \\sigma_t}{\\alpha_t^2} = \\frac{\\dot{\\sigma}_t \\alpha_t - \\sigma_t \\dot{\\alpha}_t}{\\alpha_t^2}.
\\]
The right-hand side is precisely the <strong>quotient rule</strong> applied to \\(\\sigma_t / \\alpha_t\\):
\\[
\\frac{\\mathrm{d}}{\\mathrm{d}t}\\biggl(\\frac{\\sigma_t}{\\alpha_t}\\biggr) = \\frac{\\dot{\\sigma}_t \\alpha_t - \\sigma_t \\dot{\\alpha}_t}{\\alpha_t^2}. \\tag{5}
\\]
Substituting (5) back into (4), we obtain the <strong>simplified PF-ODE</strong>:
\\[
\\boxed{\\mathrm{d}\\biggl(\\frac{\\mathbf{x}_t}{\\alpha_t}\\biggr) = \\mathrm{d}\\biggl(\\frac{\\sigma_t}{\\alpha_t}\\biggr) \\cdot \\boldsymbol{\\epsilon}(\\mathbf{x}_t, t)}  \\tag{6}
\\]
or equivalently \\(\\mathrm{d}\\mathbf{y}_t = \\boldsymbol{\\epsilon}(\\mathbf{x}_{t_n}, t_n) \\, \\mathrm{d}n\\). This says: the signal-normalized state \\(\\mathbf{y}_t\\) evolves along the noise prediction \\(\\boldsymbol{\\epsilon}\\), parameterized by the noise-to-signal ratio \\(n_t = \\sigma_t / \\alpha_t\\). All schedule complexity is absorbed into the change of variables.
</p>

<h2>Exact Solution and Numerical Approximation</h2>

<p>
Integrating (6) from time \\(t\\) to \\(s\\) (with \\(s < t\\) in the reverse process):
\\[
\\mathbf{y}_s = \\mathbf{y}_t + \\int_{n_t}^{n_s} \\boldsymbol{\\epsilon}(\\mathbf{x}_{t_n}, t_n) \\, \\mathrm{d}n, \\tag{7}
\\]
where \\(t_n\\) is the inverse function mapping \\(n\\) back to \\(t\\). Approximating this integral with few evaluations of \\(\\boldsymbol{\\epsilon}\\) is the core problem.
</p>

<p>
Let \\(h = n_s - n_t\\). Taylor-expanding the integrand around \\(n_t\\):
\\[
\\int_{n_t}^{n_s} \\boldsymbol{\\epsilon} \\, \\mathrm{d}n = h \\, \\boldsymbol{\\epsilon}_t + \\frac{h^2}{2} \\boldsymbol{\\epsilon}_t' + \\frac{h^3}{6} \\boldsymbol{\\epsilon}_t'' + \\cdots \\tag{8}
\\]
</p>

<p>
<strong>First order (DDIM).</strong> Keep only the leading term: \\(\\Delta \\mathbf{y} \\approx h \\, \\boldsymbol{\\epsilon}_t\\).
</p>

<p>
<strong>Second order (DPM-Solver-2).</strong> Evaluate at a midpoint \\(r\\) with \\(n_r \\approx \\sqrt{n_t n_s}\\). Approximate \\(\\boldsymbol{\\epsilon}_t' \\approx (\\boldsymbol{\\epsilon}_r - \\boldsymbol{\\epsilon}_t) / (h/2)\\) and substitute into (8):
\\[
h \\, \\boldsymbol{\\epsilon}_t + \\frac{h^2}{2} \\cdot \\frac{\\boldsymbol{\\epsilon}_r - \\boldsymbol{\\epsilon}_t}{h/2} = h \\, \\boldsymbol{\\epsilon}_r.
\\]
So the midpoint rule \\(\\Delta \\mathbf{y} \\approx h \\, \\boldsymbol{\\epsilon}_r\\) is second-order accurate.
</p>

<h2>Background: Linear Multistep Methods</h2>

<p>
Before deriving ConsistencySolver, we review the classical theory of <strong>Linear Multistep Methods</strong> (LMMs) [Hairer et al., 1993; Butcher, 2016; Sauer, 2018], one of the two major families of ODE solvers (the other being Runge-Kutta methods).
</p>

<p>
Consider a general initial value problem \\(\\dot{\\mathbf{x}} = f(\\mathbf{x}, t)\\). A <strong>single-step method</strong> (e.g., Euler, Runge-Kutta) computes \\(\\mathbf{x}_{i+1}\\) using only \\(\\mathbf{x}_i\\) and one or more fresh evaluations of \\(f\\). A <strong>multistep method</strong>, by contrast, reuses function evaluations from <em>previous</em> steps \\(f_i, f_{i-1}, \\ldots, f_{i-m+1}\\) that have already been computed and cached. This is attractive because each step requires only <em>one</em> new evaluation of \\(f\\), yet can achieve high-order accuracy by leveraging the history.
</p>

<p>
The general \\(m\\)-step LMM takes the form
\\[
\\mathbf{x}_{t_{i+1}} = \\sum_{j=0}^{m-1} \\mu_j \\, \\mathbf{x}_{t_{i-j}} + h \\sum_{j=0}^{m} w_j \\, f(t_{i+1-j}, \\mathbf{x}_{t_{i+1-j}}), \\tag{9}
\\]
where \\(h = t_{i+1} - t_i\\) is the step size, and \\(\\mu_j, w_j\\) are method-specific coefficients. Two important sub-families are:
</p>

<ul>
<li><strong>Adams-Bashforth</strong> (explicit, \\(w_0 = 0\\)): uses only past evaluations \\(f_i, f_{i-1}, \\ldots\\) to extrapolate. No nonlinear solve needed. The 4-step variant has coefficients \\(w_1 = 55/24, w_2 = -59/24, w_3 = 37/24, w_4 = -9/24\\), derived by fitting a degree-3 polynomial through the four past \\(f\\)-values and integrating it over \\([t_i, t_{i+1}]\\).</li>
<li><strong>Adams-Moulton</strong> (implicit, \\(w_0 \\neq 0\\)): also uses \\(f_{i+1}\\), the evaluation at the <em>yet-to-be-determined</em> next state. This requires solving a nonlinear equation at each step (e.g., via fixed-point iteration), but gains better stability. The trapezoidal rule (\\(m=1\\), \\(w_0 = w_1 = 1/2\\)) is the simplest example.</li>
</ul>

<p>
In both families, the coefficients \\(\\mu_j\\) and \\(w_j\\) are traditionally derived from <strong>polynomial interpolation</strong>: approximate \\(f\\) by a polynomial through the known values, then integrate exactly. For Adams methods specifically, one sets \\(\\mu_0 = 1\\) and \\(\\mu_j = 0\\) for \\(j \\ge 1\\) (i.e., only the most recent state is used as the base), and all the "memory" enters through the derivative weights \\(w_j\\).
</p>

<p>
A key property: an \\(m\\)-step Adams-Bashforth method has <strong>order \\(m\\)</strong>, meaning its local truncation error is \\(O(h^{m+1})\\). More history = higher accuracy per step, but also a larger "startup" phase (the first \\(m-1\\) steps must use lower-order methods).
</p>

<h2>ConsistencySolver from Linear Multistep Methods</h2>

<p>
We now adapt the LMM framework to the simplified PF-ODE (6). Recall that in the \\((\\mathbf{y}, n)\\) coordinates, the ODE is \\(\\mathrm{d}\\mathbf{y} = \\boldsymbol{\\epsilon} \\, \\mathrm{d}n\\), which has exactly the form \\(\\dot{\\mathbf{x}} = f(\\mathbf{x}, t)\\) with \\(f = \\boldsymbol{\\epsilon}\\) and the "time" variable being \\(n\\). Applying the general LMM (9) and making three principled modifications:
</p>

<ul>
<li><strong>Explicit only</strong> (\\(w_0 = 0\\)): PF-ODE trajectories are smooth and non-stiff, so implicit solves are unnecessary.</li>
<li><strong>Anchor to current state</strong> (\\(\\mu_0 = 1\\), \\(\\mu_j = 0\\) for \\(j \\ge 1\\)): following the Adams family, we keep only \\(\\mathbf{y}_{t_i}\\) as the base and achieve higher-order accuracy through blending past \\(\\boldsymbol{\\epsilon}\\) evaluations.</li>
<li><strong>Timestep-conditioned coefficients</strong>: replace fixed \\(w_j\\) (derived from polynomial interpolation theory) with learned \\(w_j(t_i, t_{i+1})\\), allowing the solver to adapt across the denoising trajectory.</li>
</ul>

<p>
This yields the <strong>ConsistencySolver update</strong>:
\\[
\\boxed{\\mathbf{y}_{t_{i+1}} = \\mathbf{y}_{t_i} + (n_{t_{i+1}} - n_{t_i}) \\cdot \\biggl[ \\sum_{j=1}^{m} w_j(t_i, t_{i+1}) \\cdot \\boldsymbol{\\epsilon}_{i+1-j} \\biggr]} \\tag{10}
\\]
where \\(\\boldsymbol{\\epsilon}_{i+1-j}\\) are cached noise predictions from past steps, and the coefficients come from a lightweight MLP:
\\[
[w_1, w_2, \\ldots, w_m]^\\top = \\boldsymbol{f}_{\\boldsymbol{\\theta}}(t_i, t_{i+1}).
\\]
</p>

<h3>Special Cases</h3>

<p>
<strong>DDIM</strong> is (10) with \\(m = 1\\), \\(w_1 = 1\\).
</p>

<p>
<strong>PNDM</strong> (4-step Adams-Bashforth) is (10) with \\(m = 4\\) and fixed coefficients
\\[
w_1 = \\tfrac{55}{24}, \\quad w_2 = -\\tfrac{59}{24}, \\quad w_3 = \\tfrac{37}{24}, \\quad w_4 = -\\tfrac{9}{24}.
\\]
</p>

<p>
<strong>DPM-Solver-2</strong> alternates: at even steps, \\(m=1\\), \\(w_1 = 1\\); at odd steps, \\(m=2\\) with
\\[
w_1 = \\frac{n_{t_{i+1}} - n_{t_{i-1}}}{n_{t_{i+1}} - n_{t_i}}, \\quad w_2 = -\\frac{n_{t_i} - n_{t_{i-1}}}{n_{t_{i+1}} - n_{t_i}}.
\\]
</p>

<p>
All these solvers use fixed, analytically derived coefficients. ConsistencySolver replaces them with <em>learned</em> coefficients optimized end-to-end. The MLP takes just two scalars \\((t_i, t_{i+1})\\) as input and outputs \\(m\\) weights, making it extremely lightweight.
</p>

<h2>RL-Based Optimization</h2>

<p>
Let \\(\\mathbf{x}_{\\text{gt}}\\) be the full-step (e.g., 40-step) output and \\(\\mathbf{x}_{\\text{p}}\\) the few-step ConsistencySolver preview, both from the same noise \\(\\mathbf{z}\\) and prompt \\(\\boldsymbol{c}\\). The goal is
\\[
\\boldsymbol{\\Psi}_{\\theta^*} = \\arg\\max_{\\boldsymbol{\\Psi}_{\\boldsymbol{\\theta}}} \\mathbb{E}_{\\mathbf{z}, \\boldsymbol{c}} \\bigl[ \\mathrm{Sim}(\\mathbf{x}_{\\text{gt}}, \\mathbf{x}_{\\text{p}}) \\bigr].
\\]
We cast this as a sequential decision problem and optimize with <strong>PPO</strong>. At each step \\(t_i \\to t_{i+1}\\), the MLP policy outputs coefficients \\(w_1, \\ldots, w_m\\). After the full \\(K\\)-step rollout, a scalar reward \\(\\mathcal{R} = \\mathrm{Sim}(\\mathbf{x}_{\\text{gt}}, \\mathbf{x}_{\\text{p}})\\) (e.g., depth map PSNR) is computed. The PPO clipped objective is
\\[
\\mathcal{J}_{\\text{PPO}} = \\mathbb{E} \\Bigl[ \\min\\bigl( r(\\theta) \\hat{A}, \\; \\mathrm{clip}(r(\\theta), 1-\\epsilon, 1+\\epsilon) \\hat{A} \\bigr) \\Bigr]
\\]
with advantage \\(\\hat{A} = (\\mathcal{R} - \\mathbb{E}[\\mathcal{R}]) / (\\sigma[\\mathcal{R}] + \\delta)\\).
</p>

<p>
Compared with distillation-based training (which backpropagates through the entire diffusion chain), RL has three advantages: (1) it supports non-differentiable rewards; (2) it optimizes the <em>final</em> output globally rather than matching intermediate segments; (3) only the compact MLP participates in gradient computation, so training takes ~12 H100 GPU hours total.
</p>

<h2>References</h2>

<p>[2] Song, Meng, and Ermon. "Denoising Diffusion Implicit Models." ICLR 2021.</p>
<p>[3] Lu et al. "DPM-Solver: A Fast ODE Solver for Diffusion Probabilistic Model Sampling in Around 10 Steps." NeurIPS 2022.</p>
<p>[4] Liu et al. "Pseudo Numerical Methods for Diffusion Models on Manifolds." ICLR 2022.</p>
<p>[5] Schulman et al. "Proximal Policy Optimization Algorithms." arXiv 2017.</p>
<p>[6] Hairer, N&oslash;rsett, and Wanner. "Solving Ordinary Differential Equations I: Nonstiff Problems." Springer, 1993. (Chapter III: Multistep Methods)</p>
<p>[7] Butcher, J. C. "Numerical Methods for Ordinary Differential Equations." Wiley, 2016.</p>
<p>[8] Sauer, T. "Numerical Analysis." 3rd edition, Pearson, 2018.</p>

`;
